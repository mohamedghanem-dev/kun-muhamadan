<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>كن محمداً - التطبيق الإسلامي الشامل</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#042f1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/jpeg" href="/app_icon.jpg" />
    <link rel="apple-touch-icon" href="/app_icon.jpg" />
  </head>
  <body class="bg-stone-50 text-stone-900 selection:bg-emerald-100 selection:text-emerald-900">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered successfully!', reg.scope))
            .catch(err => console.error('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
